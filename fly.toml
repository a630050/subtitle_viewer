# fly.toml app configuration file for subtitle-viewer-flyio
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'subtitle-viewer-flyio'
primary_region = 'hkg'

[build]

# --- 新增區塊 START ---
# 這個 [processes] 區塊定義了如何啟動您的應用程式。
# "web" 這個名稱對應下面 [[services]] 中的 processes = ["web"]
[processes]
  web = "gunicorn -k eventlet -w 1 --bind '0.0.0.0:8080' app:app"

# 這個 [guest] 區塊定義了虛擬機的規格，符合免費方案。
[guest]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
# --- 新增區塊 END ---


[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  
  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "get"
    path = "/"